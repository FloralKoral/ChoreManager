<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chore Manager</title>
  </head>
  <body>
    <div id="topnav-placeholder"></div>
    
    
    
    
    
    <!-- div class contenet container
    div id sidenav class collapsible sidenav
    div id left menu inner and contains styles
    div id left menu inner inner contains all the contents
    -->


    <script>
        fetch('topnav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('topnav-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading the topnav:', error));
    </script>
  </body>
</html>
